<!DOCTYPE html>
<html>
<head>

<title>D&D Central</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Roboto&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
background:#121217;
color:white;
font-family:Roboto;
}

header{
background:linear-gradient(90deg,#4b2a82,#7a2bbf);
padding:20px;
font-size:32px;
text-align:center;
font-family:Cinzel;
letter-spacing:2px;
}

nav{
display:flex;
justify-content:center;
background:#1b1b24;
}

nav button{
background:none;
border:none;
color:white;
padding:15px 25px;
font-size:16px;
cursor:pointer;
transition:.2s;
font-family:Cinzel;
}

nav button:hover{
background:#333;
}

.tab{
display:none;
padding:30px;
max-width:1100px;
margin:auto;
}

.active{
display:block;
}

.card{
background:#1e1e29;
padding:20px;
margin:15px 0;
border-radius:10px;
box-shadow:0 0 10px #000;
}

input,select,textarea{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button.action{
background:#7a2bbf;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

button.action:hover{
background:#9c44e8;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.statgrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

#sheet{
background:white;
color:black;
padding:30px;
border-radius:10px;
margin-top:20px;
font-family:Roboto;
}

.sheet-title{
font-family:Cinzel;
font-size:28px;
}

.logo{
font-family:Cinzel;
font-size:24px;
color:#7a2bbf;
}

</style>
</head>

<body>

<header>D&D CENTRAL</header>

<nav>

<button onclick="tab('home')">Home</button>
<button onclick="tab('dice')">Dice</button>
<button onclick="tab('char')">Character Builder</button>
<button onclick="tab('account')">Account</button>

</nav>

<!-- HOME -->

<div id="home" class="tab active">

<div class="card">
<h2>Welcome Adventurer</h2>
<p>D&D Central is your club's hub for dice rolling, character creation, and campaign tools.</p>
</div>

</div>

<!-- DICE -->

<div id="dice" class="tab">

<div class="card">

<h2>Dice Roller</h2>

<select id="diceSides">
<option value="4">d4</option>
<option value="6">d6</option>
<option value="8">d8</option>
<option value="10">d10</option>
<option value="12">d12</option>
<option value="20">d20</option>
<option value="100">d100</option>
</select>

<input type="number" id="diceAmount" value="1" min="1">

<button class="action" onclick="rollDice()">Roll</button>

<h2 id="diceResult"></h2>

</div>

</div>

<!-- CHARACTER -->

<div id="char" class="tab">

<div id="charLock" class="card">
Login required to use character builder
</div>

<div id="charContent" style="display:none">

<div class="card">

<h2>Create Character</h2>

<div class="grid">

<input id="cname" placeholder="Character Name">

<select id="crace">
<option>Human</option>
<option>Elf</option>
<option>Dwarf</option>
<option>Halfling</option>
<option>Dragonborn</option>
<option>Tiefling</option>
<option>Half-Orc</option>
<option>Gnome</option>
</select>

<select id="cclass">
<option>Fighter</option>
<option>Wizard</option>
<option>Rogue</option>
<option>Cleric</option>
<option>Paladin</option>
<option>Warlock</option>
<option>Bard</option>
<option>Ranger</option>
<option>Monk</option>
<option>Druid</option>
</select>

<input id="clevel" type="number" value="1">

</div>

<h3>Ability Scores</h3>

<div class="statgrid">

<input id="str" type="number" placeholder="STR">
<input id="dex" type="number" placeholder="DEX">
<input id="con" type="number" placeholder="CON">
<input id="int" type="number" placeholder="INT">
<input id="wis" type="number" placeholder="WIS">
<input id="cha" type="number" placeholder="CHA">

</div>

<h3>Inventory</h3>

<textarea id="inventory" rows="3"></textarea>

<h3>Notes</h3>

<textarea id="notes" rows="3"></textarea>

<br>

<button class="action" onclick="buildSheet()">Preview Sheet</button>
<button class="action" onclick="downloadSheet()">Download Sheet Image</button>

<div id="sheet"></div>

</div>

</div>

</div>

<!-- ACCOUNT -->

<div id="account" class="tab">

<div id="loginBox" class="card">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<br>

<button class="action" onclick="login()">Login</button>

<h2>Create Account</h2>

<input id="newUser" placeholder="Username">
<input id="newPass" type="password" placeholder="Password">

<br>

<button class="action" onclick="signup()">Sign Up</button>

</div>

<div id="accountPanel" style="display:none" class="card">

<h2 id="welcome"></h2>

<button class="action" onclick="logout()">Logout</button>

</div>

</div>

<script>

let user=null

function tab(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function rollDice(){

let sides=parseInt(diceSides.value)
let amount=parseInt(diceAmount.value)

let total=0
let rolls=[]

for(let i=0;i<amount;i++){

let r=Math.floor(Math.random()*sides)+1
rolls.push(r)
total+=r

}

diceResult.innerHTML="Rolls: "+rolls.join(", ")+"<br>Total: "+total

}

function signup(){

let u=newUser.value
let p=newPass.value

if(localStorage.getItem("user_"+u)){
alert("Username already exists on this device")
return
}

localStorage.setItem("user_"+u,p)

alert("Account created")

}

function login(){

let u=loginUser.value
let p=loginPass.value

let saved=localStorage.getItem("user_"+u)

if(saved===p){

user=u

loginBox.style.display="none"
accountPanel.style.display="block"
welcome.innerText="Logged in as "+u

charLock.style.display="none"
charContent.style.display="block"

}else{

alert("Incorrect login")

}

}

function logout(){

user=null

loginBox.style.display="block"
accountPanel.style.display="none"

charLock.style.display="block"
charContent.style.display="none"

}

function buildSheet(){

sheet.innerHTML=`

<div class="logo">D&D CENTRAL</div>

<div class="sheet-title">${cname.value}</div>

<p><b>Race:</b> ${crace.value}</p>
<p><b>Class:</b> ${cclass.value}</p>
<p><b>Level:</b> ${clevel.value}</p>

<h3>Ability Scores</h3>

<p>STR: ${str.value}</p>
<p>DEX: ${dex.value}</p>
<p>CON: ${con.value}</p>
<p>INT: ${int.value}</p>
<p>WIS: ${wis.value}</p>
<p>CHA: ${cha.value}</p>

<h3>Inventory</h3>
<p>${inventory.value}</p>

<h3>Notes</h3>
<p>${notes.value}</p>

`

}

function downloadSheet(){

html2canvas(document.querySelector("#sheet")).then(canvas=>{

let link=document.createElement("a")
link.download="character_sheet.png"
link.href=canvas.toDataURL()
link.click()

})

}

</script>

</body>
</html>
